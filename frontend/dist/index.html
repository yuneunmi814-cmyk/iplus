<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPlus</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #f7f8fa; color: #1a1a1a; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    header { margin-top: 8vh; text-align: center; }
    h1 { font-size: 38px; margin: 0 0 6px; letter-spacing: -1px; }
    .sub { color: #6b7280; font-size: 15px; margin-bottom: 22px; }
    .composer {
      width: min(680px, 90vw); display: flex; gap: 8px;
      background: #fff; border: 1px solid #e3e6ea; border-radius: 14px;
      padding: 10px 10px 10px 16px; box-shadow: 0 4px 18px rgba(0,0,0,.05);
    }
    #input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; }
    button.primary {
      border: none; background: #111; color: #fff; border-radius: 10px;
      padding: 0 18px; font-size: 15px; cursor: pointer;
    }
    button.primary:disabled { opacity: .4; cursor: default; }
    .modes { display: flex; gap: 14px; margin: 12px 0 0; justify-content: center; align-items: center; }
    .modes label { font-size: 13px; color: #6b7280; cursor: pointer; }
    .modes input { margin-right: 3px; }
    .newchat {
      font-size: 12px; color: #6b7280; background: none; border: 1px solid #e3e6ea;
      border-radius: 8px; padding: 3px 10px; cursor: pointer; margin-left: 6px;
    }
    #conversation { width: min(680px, 90vw); margin-top: 22px; }
    .turn { margin-bottom: 16px; }
    .user {
      background: #111; color: #fff; border-radius: 12px 12px 4px 12px;
      padding: 8px 13px; font-size: 14px; display: inline-block; max-width: 90%;
      margin-left: auto; float: right; clear: both;
    }
    .card {
      clear: both; background: #fff; border: 1px solid #e3e6ea; border-radius: 12px;
      padding: 16px; font-size: 14px; margin-top: 8px;
    }
    .chip {
      display: inline-block; background: #eef2ff; color: #3730a3;
      border-radius: 6px; padding: 2px 8px; font-size: 12px; margin: 0 6px 6px 0;
    }
    .meta { color: #6b7280; font-size: 12px; margin: 2px 0 10px; }
    .warn { color: #b91c1c; }
    .answer { white-space: pre-wrap; line-height: 1.55; font-size: 15px; }
    .status { position: fixed; bottom: 12px; font-size: 12px; color: #9ca3af; }
    .gear {
      position: fixed; top: 14px; right: 16px; cursor: pointer;
      font-size: 18px; color: #9ca3af; background: none; border: none;
    }
    .panel {
      position: fixed; top: 44px; right: 16px; width: 320px; background: #fff;
      border: 1px solid #e3e6ea; border-radius: 12px; padding: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12); display: none; z-index: 10;
    }
    .panel.show { display: block; }
    .panel h3 { margin: 0 0 4px; font-size: 14px; }
    .panel p { margin: 0 0 12px; font-size: 12px; color: #6b7280; }
    .panel label { display: block; font-size: 12px; color: #374151; margin: 8px 0 3px; }
    .panel input { width: 100%; padding: 7px 9px; border: 1px solid #e3e6ea; border-radius: 8px; font-size: 13px; }
    .panel .save { margin-top: 12px; width: 100%; padding: 8px; border: none; background: #111; color: #fff; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <button class="gear" id="gear" title="API keys">⚙</button>
  <div class="panel" id="panel">
    <h3>API keys (optional)</h3>
    <p>Stored locally on your machine. Leave empty to use a local model (Ollama).</p>
    <label>OpenAI</label><input id="k-openai" type="password" placeholder="sk-…" />
    <label>Anthropic</label><input id="k-anthropic" type="password" placeholder="sk-ant-…" />
    <label>Google</label><input id="k-google" type="password" placeholder="AIza…" />
    <button class="save" id="save">Save</button>
  </div>

  <header>
    <h1>iPlus</h1>
    <div class="sub">Just say what you want to do. Leave the rest to us.</div>
  </header>

  <div class="composer">
    <input id="input" placeholder="e.g. Draft a business plan" autofocus />
    <button class="primary" id="go">Run</button>
  </div>
  <div class="modes">
    <label><input type="radio" name="mode" value="eco">Economy</label>
    <label><input type="radio" name="mode" value="balanced" checked>Balanced</label>
    <label><input type="radio" name="mode" value="quality">Quality</label>
    <button class="newchat" id="newchat" title="Start a new conversation">New chat</button>
  </div>

  <div id="conversation"></div>
  <div class="status" id="status">Checking engine connection…</div>

  <script>
    const ENGINE = "http://127.0.0.1:8787";
    const $ = (id) => document.getElementById(id);
    const PROVIDERS = ["openai", "anthropic", "google"];
    let currentTaskId = null;  // conversation thread (SCB)
    let pendingClarify = null; // original ask awaiting a clarifying answer

    const escapeHtml = (s) => s.replace(/[&<>"]/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    // ---- key settings (localStorage) ----
    function loadKeys() {
      const k = JSON.parse(localStorage.getItem("iplus_keys") || "{}");
      PROVIDERS.forEach((p) => { if (k[p]) $("k-" + p).value = k[p]; });
      return k;
    }
    async function pushKeys(k) {
      try { await fetch(ENGINE + "/config", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(k),
      }); } catch {}
    }
    $("gear").onclick = () => $("panel").classList.toggle("show");
    $("save").onclick = async () => {
      const k = {};
      PROVIDERS.forEach((p) => { k[p] = $("k-" + p).value.trim(); });
      localStorage.setItem("iplus_keys", JSON.stringify(k));
      await pushKeys(k);
      $("panel").classList.remove("show");
      ping();
    };
    $("newchat").onclick = () => { currentTaskId = null; $("conversation").innerHTML = ""; $("input").focus(); };

    async function ping() {
      try {
        const r = await fetch(ENGINE + "/health");
        const j = await r.json();
        $("status").textContent = `Engine v${j.version} connected` +
          (j.keys.length ? ` · keys: ${j.keys.join(", ")}` : " · local mode (Ollama)");
      } catch {
        $("status").textContent = "Engine not connected — check the iplus-engine sidecar";
      }
    }

    // ---- run with SSE streaming + conversation threading ----
    async function run() {
      const typed = $("input").value.trim();
      if (!typed) return;
      // if we just asked a clarifying question, fold the answer into the original ask
      let sendInput = typed;
      if (pendingClarify) { sendInput = pendingClarify + " — into " + typed; pendingClarify = null; }
      const mode = document.querySelector('input[name=mode]:checked').value;
      $("go").disabled = true;
      $("input").value = "";

      // append a turn (user bubble + routing + answer area)
      const turn = document.createElement("div");
      turn.className = "turn";
      turn.innerHTML = `<div class="user">${escapeHtml(typed)}</div>` +
        `<div class="card"><div class="routing"></div><div class="answer"></div></div>`;
      $("conversation").appendChild(turn);
      const routingEl = turn.querySelector(".routing");
      const answerEl = turn.querySelector(".answer");
      turn.scrollIntoView({ behavior: "smooth", block: "end" });

      try {
        const body = { input: sendInput, mode };
        if (currentTaskId) body.task_id = currentTaskId;
        const resp = await fetch(ENGINE + "/generate", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
        });
        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const events = buf.split("\n\n");
          buf = events.pop();
          for (const ev of events) handleEvent(ev, routingEl, answerEl, sendInput);
        }
      } catch (e) {
        answerEl.innerHTML = '<span class="warn">Engine call failed: ' + e + "</span>";
      } finally {
        $("go").disabled = false;
        $("input").focus();
      }
    }

    function handleEvent(raw, routingEl, answerEl, sendInput) {
      const lines = raw.split("\n");
      let type = "message", data = "";
      for (const l of lines) {
        if (l.startsWith("event: ")) type = l.slice(7);
        else if (l.startsWith("data: ")) data += l.slice(6);
      }
      if (type === "clarify") {
        const r = JSON.parse(data);
        pendingClarify = sendInput;  // next answer folds back into this ask
        routingEl.innerHTML = `<span class="chip">${r.classification.intent}</span>`;
        answerEl.innerHTML = "<i>" + r.question + "</i>";
      } else if (type === "routing") {
        const r = JSON.parse(data), c = r.classification;
        currentTaskId = r.task_id;
        const cost = r.cost_in_out ? `$${r.cost_in_out[0]}/$${r.cost_in_out[1]} per 1M` : "unit price";
        routingEl.innerHTML =
          `<span class="chip">${c.domain}</span><span class="chip">${c.intent}</span>` +
          `<span class="chip">${r.model || "no model"}</span>` +
          `<div class="meta">mode: ${r.mode} · ${cost} · turn ${r.turn}` +
          (r.note ? ` · <span class="warn">${r.note}</span>` : "") + `</div>`;
      } else if (type === "token") {
        answerEl.textContent += JSON.parse(data);
      } else if (type === "error") {
        let msg = data; try { msg = JSON.parse(data); } catch {}
        answerEl.innerHTML += '<span class="warn">' + msg + "</span>";
      }
    }

    $("go").addEventListener("click", run);
    $("input").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });

    // boot
    const initialKeys = loadKeys();
    if (PROVIDERS.some((p) => initialKeys[p])) pushKeys(initialKeys);
    ping(); setInterval(ping, 5000);
  </script>
</body>
</html>
