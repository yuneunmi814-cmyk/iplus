name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
          # NOTE: Intel macOS (x86_64) is intentionally omitted for now —
          # PyInstaller can't cross-compile the engine on the arm64 runner, so an
          # x86_64 installer would bundle an arm64 sidecar. Add a native x86_64
          # engine build before re-enabling this target.
          - platform: windows-latest
            args: ""
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python engine (PyInstaller → externalBin)
        shell: bash
        run: |
          cd engine
          python -m pip install -r requirements.txt pyinstaller
          pyinstaller --onefile --clean --name iplus-engine \
            --hidden-import uvicorn.logging --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.lifespan.on --collect-submodules app run.py
          mkdir -p ../frontend/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; else EXT=""; fi
          cp "dist/iplus-engine${EXT}" "../frontend/src-tauri/binaries/iplus-engine-${{ matrix.triple }}${EXT}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). The pubkey lives in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing / notarization (optional — ad-hoc build without it)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "iPlus ${{ github.ref_name }}"
          releaseDraft: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
