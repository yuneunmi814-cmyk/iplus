name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: engine
        run: pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: engine
        run: python -m pytest tests/ -q
